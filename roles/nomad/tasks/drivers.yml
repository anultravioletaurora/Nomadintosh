- name: Ensure Go is installed
  community.general.homebrew:
    name:
      - go
    state: latest
    update_homebrew: true

- name: Create tmp directory for Podman driver plugin
  ansible.builtin.file:
    path: "/tmp/nomad-driver-podman"
    state: directory

- name: Create plugins directory for Nomad
  ansible.builtin.file:
    path: "/opt/nomad/plugins"
    state: directory
    mode: '0755'
    owner: "{{ ansible_user }}"
    group: "staff"

- name: Download the Podman task driver plugin
  ansible.builtin.unarchive:
    src: "https://github.com/hashicorp/nomad-driver-podman/archive/refs/tags/v{{ podman_driver_version }}.zip"
    dest: "/tmp/nomad-driver-podman"
    remote_src: true

- name: Compile the Podman driver plugin
  ansible.builtin.command: "/opt/homebrew/bin/go build -o nomad-driver-podman"
  args:
    chdir: "/tmp/nomad-driver-podman/nomad-driver-podman-{{ podman_driver_version }}"
    creates: "/tmp/nomad-driver-podman/nomad-driver-podman-{{ podman_driver_version }}/nomad-driver-podman"

- name: Move the Podman driver plugin to the Nomad plugins directory
  ansible.builtin.copy:
    src: "/tmp/nomad-driver-podman/nomad-driver-podman-{{ podman_driver_version }}/nomad-driver-podman"
    dest: "/opt/nomad/plugins/nomad-driver-podman"
    remote_src: true
    mode: '0755'
    owner: "{{ ansible_user }}"
    group: "staff"