- name: Create Directories for Nomad
  become: true
  ansible.builtin.import_tasks: directories.yml

- name: Install / Upgrade Nomad and Consul
  ansible.builtin.import_tasks: install.yml

- name: Download task drivers and plugins
  ansible.builtin.import_tasks: drivers.yml
  when: podman | default(false)

- name: Apply Nomad + Consul configuration templates
  become: true
  ansible.builtin.import_tasks: configuration.yml

- name: Apply LaunchAgents configuration
  ansible.builtin.import_tasks: launchagents.yml

- name: Kickstart Nomad and Consul services
  ansible.builtin.import_tasks: services.yml
  when: hashicorp_package_updated | default(false)