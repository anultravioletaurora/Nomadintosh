- name: Perform Nomadintosh deployment
  hosts: all
  # Need to fetch IPv4 addresses for Consul's configuration
  gather_facts: true 
  pre_tasks:
    - name: Ensure host is running macOS
      ansible.builtin.assert:
        that: ansible_facts['os_family'] == 'Darwin'
        fail_msg: "This playbook is intended to run on macOS hosts only."

    - name: Set additional facts
      ansible.builtin.include_role:
        name: ./roles/set_facts

    - name: Perform Software Update
      ansible.builtin.include_role:
        name: ./roles/software_update
  tasks:
    - name: Install Homebrew
      ansible.builtin.include_role:
        name: geerlingguy.mac.homebrew
      vars:
        homebrew_taps:
          - name: hashicorp/tap
        homebrew_install_packages: "{{ additional_homebrew_packages | default([]) }}"

    - name: Include Docker Desktop role
      ansible.builtin.include_role:
        name: ./roles/docker_desktop
      when: docker | default(false)

    - name: Include Podman role
      ansible.builtin.include_role:
        name: ./roles/podman
      when: podman | default(false)

    - name: Include Consul role
      ansible.builtin.include_role:
        name: ./roles/consul

    - name: Include Nomad role
      ansible.builtin.include_role:
        name: ./roles/nomad

    - name: Deploy Nomad Jobs
      block:

      - name: Include GH Actions Role
        ansible.builtin.include_role:
          name: ./roles/github_actions
        when: gh_actions | default(false)

      - name: Include Minecraft Server Role
        ansible.builtin.include_role:
          name: ./roles/minecraft
        when: minecraft | default(false)

        